settings.validation.pending.title=Validation Pending
settings.validation.host.title=Invalid Host
settings.validation.serverAddress.title=Address Unavailable
settings.serverAddress.unavailable=Address {0} is already in use. Please choose a different host or port.
settings.serverPort=Server Port
settings.serverPort.tooltip=<html>The port number for the MCP server.<br><br>\
Default: 29170<br>\
Valid range: 1024-65535<br><br>\
Changes take effect immediately (server auto-restarts).</html>
settings.syncExternalChanges=Sync external file changes before operations
settings.syncExternalChanges.warning=WARNING: This option significantly slows down every operation. Only enable if absolutely necessary.
settings.syncExternalChanges.tooltip=<html><b style="color:red;">WARNING: SIGNIFICANT PERFORMANCE IMPACT</b><br><br>\
When enabled, the plugin performs a full VFS refresh before EVERY operation.<br>\
This can make each tool call take <b>seconds instead of milliseconds</b>,<br>\
especially on large repositories.<br><br>\
<b>Only enable if:</b> Rename/find-usages is missing references in files<br>\
that were just created by external tools (like Claude Code's write command).<br><br>\
<b>Recommended:</b> Keep disabled. Most use cases don't require this.</html>
settings.unixSocket=Enable Unix domain socket transport
settings.unixSocket.tooltip=<html>Listen on a Unix domain socket instead of (or in addition to) TCP.<br><br>\
This bypasses network restrictions entirely — no TCP/IP is used.<br>\
Useful when corporate firewalls block localhost connections.<br><br>\
Changes take effect immediately.</html>
settings.unixSocketPath=Socket Path
settings.unixSocketPath.tooltip=<html>Path to the Unix domain socket file.<br><br>\
Default: /tmp/unity-index-mcp.sock<br><br>\
The socket file is created when the server starts and removed when it stops.</html>
settings.tools.title=Available Tools (uncheck to disable)
