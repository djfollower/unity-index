# Settings
settings.title=Unity Index MCP Server
settings.serverHost=Server Host
settings.serverHost.tooltip=<html>The host address to bind the MCP server to.<br><br>\
Default: 127.0.0.1 (localhost)<br>\
Use 0.0.0.0 to allow connections from other machines.<br><br>\
Changes take effect immediately (server auto-restarts).</html>
settings.serverHost.empty=Server host cannot be empty
